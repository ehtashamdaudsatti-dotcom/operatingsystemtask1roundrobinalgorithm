<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Round Robin Scheduler</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>Round Robin Scheduling Simulator</h1>

<p>Enter one process per line.</p>

<p>Format:</p>

<pre>P1,5
P2,3
P3,7</pre>

<textarea id="processes" rows="8">

P1,5
P2,3
P3,7

</textarea>

<br><br>

<label>Time Quantum</label>

<input
type="number"
id="quantum"
value="2"
min="1">

<br><br>

<button onclick="simulate()">

Simulate

</button>

<hr>

<h2>Gantt Chart</h2>

<div id="result"></div>

</div>

<script src="script.js"></script>

</body>

</html>
